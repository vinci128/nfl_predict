<div id="suggestions-panel-inner">
  <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">
    Best Available
    {% if needs %}<span class="text-yellow-400">({{ needs | join(', ') }})</span>{% endif %}
  </h3>
  {% if suggestions %}
  <div class="space-y-1">
    {% for s in suggestions %}
    {% set vor = s.vor | float %}
    <div class="flex items-center gap-1 rounded px-1 py-0.5 hover:bg-gray-800 group">
      <span class="text-xs w-4 text-gray-500 shrink-0">{{ loop.index }}</span>
      <span class="text-xs font-medium truncate flex-1 cursor-pointer"
            data-pick-name="{{ s.player_name }}"
            data-player-id="{{ s.get('player_id', '') if s is mapping else '' }}">
        {{ s.player_name }}
      </span>
      <span class="text-xs shrink-0
             {% if s.position == 'QB' %}text-red-400
             {% elif s.position == 'RB' %}text-green-400
             {% elif s.position == 'WR' %}text-blue-400
             {% elif s.position == 'TE' %}text-purple-400
             {% else %}text-gray-500{% endif %}">
        {{ s.position }}
      </span>
      <span class="text-xs font-semibold shrink-0
             {% if vor > 50 %}text-green-400{% elif vor > 0 %}text-green-600{% else %}text-red-500{% endif %}">
        {{ "%.0f" | format(vor) }}
      </span>
      <button data-pick-name="{{ s.player_name }}" data-pick-mine="1"
              data-player-id="{{ s.get('player_id', '') if s is mapping else '' }}"
              class="hidden group-hover:block shrink-0 px-1.5 py-0.5 bg-green-700 hover:bg-green-600
                     rounded text-xs text-green-200 ml-1"
              title="Draft as my pick">
        Mine
      </button>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <p class="text-xs text-gray-600">No suggestions available.</p>
  {% endif %}
</div>
